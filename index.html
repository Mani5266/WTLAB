<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Exam Prep</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { text-align: center; padding: 2rem; }
h1 { font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
p { color: #94a3b8; margin-bottom: 2.5rem; font-size: 1.1rem; }
.cards { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 2.5rem 2rem; width: 280px; text-decoration: none; color: #e2e8f0; transition: all 0.2s; }
.card:hover { transform: translateY(-4px); border-color: #60a5fa; box-shadow: 0 8px 30px rgba(96,165,250,0.15); }
.card h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
.card .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1rem; }
.card .tag { display: inline-block; background: #334155; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; color: #60a5fa; }
.wt .tag { color: #60a5fa; }
.bdc .tag { color: #a78bfa; }
.bdc:hover { border-color: #a78bfa; box-shadow: 0 8px 30px rgba(167,139,250,0.15); }
.hint { margin-top: 2.5rem; color: #475569; font-size: 0.85rem; }
kbd { background: #334155; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
</style>
</head>
<body>
<div class="container">
  <h1>Lab Exam Prep</h1>
  <p>Theory + Code cheat sheets with one-click copy</p>
  <div class="cards">
    <a href="wt.html" class="card wt">
      <h2>WT Lab</h2>
      <p class="subtitle">Web Technology - 14 Weeks</p>
      <p class="subtitle">HTML, CSS, JS, XML, Servlets, JSP, Hibernate, AJAX</p>
      <span class="tag">14 experiments</span>
    </a>
    <a href="bdc.html" class="card bdc">
      <h2>BDC Lab</h2>
      <p class="subtitle">Big Data Computing - 6 Experiments</p>
      <p class="subtitle">HDFS, MapReduce, Hive, Pig, SQOOP, ARIMA</p>
      <span class="tag">6 experiments</span>
    </a>
  </div>
  <p class="hint">Press <kbd>1</kbd> for WT &middot; <kbd>2</kbd> for BDC</p>
</div>
<script>
document.addEventListener('keydown', e => {
  if (e.key === '1') window.location.href = 'wt.html';
  if (e.key === '2') window.location.href = 'bdc.html';
});
</script>
</body>
</html>
